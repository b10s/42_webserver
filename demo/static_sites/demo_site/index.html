<!doctype html>
<html>
<head><meta charset="utf-8"><title>webserv eval</title></head>
<body>
  <h1>webserv evaluation dashboard</h1>
  <ul>
    <li><a href="/static/a.txt">GET static file</a></li>
    <li><a href="/dirlist/">Autoindex directory listing</a></li>
    <li><a href="/redirect">Redirect test (/redirect)</a></li>
    <li><a href="/cgi/ok.py">CGI GET (ok.py)</a></li>
  </ul>

  <h2>POST upload</h2>
  <form method="POST" action="/upload/posted.txt">
    <textarea name="data" rows="4" cols="50">hello</textarea><br>
    <button type="submit">POST</button>
  </form>


<hr/>
<!-- index.html with JavaScript -->
<form id="uploadForm" action="/upload" method="POST" enctype="multipart/form-data">
    <input type="file" name="filename"  id="fileInput" />
    <input type="submit" value="Upload" />
</form>

<script>
document.querySelector('#uploadForm').addEventListener('submit', function(event) {
    event.preventDefault(); // Stop the default form submission and page reload
    var formData = new FormData(this);

    var fileInput = document.querySelector('#fileInput');
    var file = fileInput.files[0];           // get selected file
    var fileName = encodeURIComponent(file.name); // safe for URL
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/upload/' + fileName, true);
    xhr.onload = function () {
        if (xhr.status === 201) {
            // Redirect after successful upload
            window.location.href = '/';
        }
    };
    xhr.send(formData);
});
</script>
<hr/>

  <p>DELETE test (use curl): <code>curl -X DELETE http://127.0.0.1:8080/upload/posted.txt</code></p>
</body>
</html>
