server {
  listen 127.0.0.1:8080;
  server_name webserv_eval;
  client_max_body_size 100000000;

  location / {
    root ./demo/static_sites/demo_site;
    index index.html;
    allowed_methods GET;
  }

  location /post_body {
    root ./demo/static_sites/demo_site;
    allowed_methods POST;
  }

  location /directory/ {
    root ./YoupiBanane;
    index youpi.bad_extension;
    cgi on;
    cgi_allowed_extensions .bla;
    allowed_methods GET POST;
  }
}
