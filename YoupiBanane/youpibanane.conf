server {
  listen 127.0.0.1:8080;
  server_name tester_site;
  client_max_body_size 100;

  location / {
    root ./YoupiBanane;
    index youpi.bad_extension;
    allowed_methods GET;
  }

  location /directory/ {
    root ./YoupiBanane;
    allowed_methods GET;
    index youpi.bad_extension;
  }

  location /post_body {
    root ./demo/static_sites/demo_site;
    allowed_methods POST;
  }
}
